<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 - Schedule by Date (BST)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-rose: #f43f5e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --time-color: #34d399;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
        }
        header {
            text-align: center;
            padding: 24px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        h1 {
            color: var(--accent-blue);
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Search */
        .search-bar {
            padding: 12px 16px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }
        .search-bar input {
            width: 100%;
            max-width: 500px;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            display: block;
            margin: 0 auto;
        }
        .search-bar input:focus { border-color: var(--accent-blue); }
        #matchCount {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Date nav tabs */
        .date-tabs {
            display: flex;
            overflow-x: auto;
            gap: 6px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
            scrollbar-width: thin;
            scrollbar-color: var(--accent-blue) var(--card-bg); 
        }
        /* .date-tabs::-webkit-scrollbar { display: none; } */
        .date-tab {
            flex-shrink: 0;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .date-tab:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .date-tab.active { background: var(--accent-blue); color: #0f172a; border-color: var(--accent-blue); font-weight: 600; }
        .date-tab.knockout-tab { border-color: var(--accent-rose); color: var(--accent-rose); }
        .date-tab.knockout-tab.active { background: var(--accent-rose); color: #fff; }

        /* Content */
        .container { padding: 16px; max-width: 900px; margin: 0 auto; }

        .date-section { margin-bottom: 28px; }
        .date-section.hidden { display: none; }

        .date-heading {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-blue);
            border-left: 4px solid var(--accent-blue);
            padding-left: 10px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .date-heading.knockout { color: var(--accent-rose); border-left-color: var(--accent-rose); }

        /* Match cards */
        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .match-card.hidden { display: none; }
        .match-card:hover { border-color: var(--accent-blue); }
        .match-card.knockout-card:hover { border-color: var(--accent-rose); }

        .match-num {
            color: var(--accent-blue);
            font-weight: 700;
            font-size: 13px;
            min-width: 28px;
        }
        .knockout-card .match-num { color: var(--accent-rose); }

        .match-info { flex: 1; min-width: 0; }
        .match-teams {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .match-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .match-venue { color: var(--text-muted); }

        .match-right { text-align: right; flex-shrink: 0; }
        .match-time {
            font-weight: 700;
            color: var(--time-color);
            font-size: 14px;
        }
        .match-group {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 14px;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.2rem; }
            .match-teams { font-size: 13px; white-space: normal; }
        }
    </style>
</head>

// Build date groups
var dateGroups = {};
var dateOrder = [];
matches.forEach(function(m) {
    if (!dateGroups[m.dateKey]) {
        dateGroups[m.dateKey] = { label: m.date, matches: [], knockout: !!m.knockout };
        dateOrder.push(m.dateKey);
    }
    dateGroups[m.dateKey].matches.push(m);
    if (m.knockout) dateGroups[m.dateKey].knockout = true;
});

var activeTab = 'all';

// Build tabs
function buildTabs() {
    var tabs = document.getElementById('dateTabs');
    var allBtn = document.createElement('button');
    allBtn.className = 'date-tab active';
    allBtn.textContent = 'All';
    allBtn.onclick = function() { setTab('all'); };
    allBtn.id = 'tab-all';
    tabs.appendChild(allBtn);

    dateOrder.forEach(function(key) {
        var g = dateGroups[key];
        var btn = document.createElement('button');
        btn.className = 'date-tab' + (g.knockout ? ' knockout-tab' : '');
        // Short label
        var short = g.label.replace(/\w+, /, '').replace('June ', 'Jun ').replace('July ', 'Jul ');
        btn.textContent = short;
        btn.id = 'tab-' + key;
        btn.onclick = (function(k) { return function() { setTab(k); }; })(key);
        tabs.appendChild(btn);
    });
}

function setTab(key) {
    activeTab = key;
    // update tab styles
    document.querySelectorAll('.date-tab').forEach(function(t) { t.classList.remove('active'); });
    var activeEl = document.getElementById('tab-' + key);
    if (activeEl) activeEl.classList.add('active');
    // scroll tab into view
    if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

    document.querySelectorAll('.date-section').forEach(function(s) {
        if (key === 'all' || s.dataset.key === key) {
            s.classList.remove('hidden');
        } else {
            s.classList.add('hidden');
        }
    });
    doSearch();
}

// Build match sections

        section.className = 'date-section';
        section.dataset.key = key;

        var heading = document.createElement('div');
        heading.className = 'date-heading' + (g.knockout ? ' knockout' : '');
        heading.textContent = g.label;
        section.appendChild(heading);

        g.matches.forEach(function(m) {
            var card = document.createElement('div');
            card.className = 'match-card' + (m.knockout ? ' knockout-card' : '');
            card.dataset.search = (m.teams + ' ' + m.venue + ' ' + m.group + ' ' + m.num).toLowerCase();

            card.innerHTML =
                '<div class="match-num">#' + m.num + '</div>' +
                '<div class="match-info">' +
                    '<div class="match-teams">' + m.teams + '</div>' +
                    '<div class="match-meta">' +
                        '<span class="match-group">' + m.group + '</span>' +
                        (m.venue ? '<span class="match-venue">📍 ' + m.venue + '</span>' : '') +
                    '</div>' +
                '</div>' +
                '<div class="match-right">' +
                    '<div class="match-time">' + m.time + '</div>' +
                '</div>';

            section.appendChild(card);
        });

        container.appendChild(section);
    });
}

function doSearch() {
    var q = document.getElementById('searchInput').value.toLowerCase().trim();
    var visible = 0;

    document.querySelectorAll('.date-section').forEach(function(section) {
        var key = section.dataset.key;
        var sectionVisible = activeTab === 'all' || key === activeTab;
        if (!sectionVisible) { section.classList.add('hidden'); return; }
        section.classList.remove('hidden');

        var cards = section.querySelectorAll('.match-card');
        var anyVisible = false;
        cards.forEach(function(card) {
            if (!q || card.dataset.search.indexOf(q) !== -1) {
                card.classList.remove('hidden');
                anyVisible = true;
                visible++;
            } else {
                card.classList.add('hidden');
            }
        });
        if (q && !anyVisible) section.classList.add('hidden');
    });

    document.getElementById('matchCount').textContent = q ? visible + ' match' + (visible !== 1 ? 'es' : '') + ' found' : '';
}

function selectToday() {
    var now = new Date();
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var month = months[now.getMonth()];
    var day = now.getDate();
    var key = month + (day < 10 ? '0' + day : day);

    console.log('Today key:', key);
    console.log('Available keys:', dateOrder);

    var todayStr = now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    var sub = document.querySelector('.subtitle');
    if (sub) sub.innerHTML = '104-Match Schedule by Date | Bangladesh Standard Time (BST)<br><span style="color:var(--time-color);font-size:0.85rem;">📅 Today: ' + todayStr + '</span>';

    var todayTab = document.getElementById('tab-' + key);
    console.log('Tab found:', todayTab);

    if (todayTab) {
        todayTab.style.outline = '2px solid var(--time-color)';
        todayTab.style.outlineOffset = '2px';
        setTab(key);
    }
}

buildTabs();
buildSections();
selectToday();
