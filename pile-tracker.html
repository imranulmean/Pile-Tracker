const PROJECTS_KEY = "piletracker:projects";
const PILES_KEY = "piletracker:piles";
const REGISTER_KEY = "piletracker:register";
const SHARED = true;
const hasStore = true;
const photoKey = (pileId, hp) => `piletracker:photo:${pileId}:${hp}`;

async function getKey(key) {
  if (!hasStore) return null;
  try { const v = localStorage.getItem(key); return v == null ? null : JSON.parse(v); }
  catch (e) { return null; }
}
async function setKey(key, val) {
  if (!hasStore) return true;
  try { localStorage.setItem(key, JSON.stringify(val)); return true; }
  catch (e) { return false; }
}
async function delKey(key) { if (!hasStore) return; try { localStorage.removeItem(key); } catch (e) {} }

function fileToDataUrl(file, maxDim = 1000, quality = 0.62) {
  return new Promise((resolve, reject) => {
    const img = new Image(); const url = URL.createObjectURL(file);
    img.onload = () => {
      let { width, height } = img;
      if (width > height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
      else if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
      const c = document.createElement("canvas"); c.width = width; c.height = height;
      c.getContext("2d").drawImage(img, 0, 0, width, height); URL.revokeObjectURL(url);
      try { resolve(c.toDataURL("image/jpeg", quality)); } catch (e) { reject(e); }
    };
    img.onerror = reject; img.src = url;
  });
}

/* ───────────────────────── domain ───────────────────────── */
const STAGES = [
  { key: "not_started", label: "Not started", short: "Pending", color: "#94A0AE" },
  { key: "drilled", label: "Drilled", short: "Drilled", color: "#3B82C4" },
  { key: "cage", label: "Cage installed", short: "Cage", color: "#7A5BD0" },
  { key: "poured", label: "Poured", short: "Poured", color: "#E0871E" },
  { key: "qa", label: "QA signed off", short: "QA done", color: "#2E9E5B" },
];
const stageMeta = (k) => STAGES.find((s) => s.key === k) || STAGES[0];
function computeStage(p) {
  if (p.qaStatus === "Signed off") return "qa";
  if (p.pourDate) return "poured";
  if (p.cageStatus === "Installed") return "cage";
  if (p.drillDate) return "drilled";
  return "not_started";
}
const num = (v) => { const n = parseFloat(v); return isNaN(n) ? null : n; };
function theoreticalVol(p) {
  const dia = num(p.actualDia) ?? num(p.dia);
  const depth = num(p.actualDepth);
  if (!dia || !depth) return null;
  const r = dia / 2 / 1000;
  return Math.PI * r * r * depth;
}
const HP_DEF = { released: false, inspector: "", date: "", hasPhoto: false };
function getHp(p) {
  return { drill: { ...HP_DEF, ...(p.hp && p.hp.drill) }, cage: { ...HP_DEF, ...(p.hp && p.hp.cage) }, pour: { ...HP_DEF, ...(p.hp && p.hp.pour) } };
}
function flagsFor(p) {
  const out = [];
  const dDia = num(p.dia), aDia = num(p.actualDia);
  if (dDia != null && aDia != null && aDia !== dDia) out.push({ level: "warn", text: `Ø mismatch: ${aDia} vs ${dDia} spec` });
  const stage = computeStage(p), hp = getHp(p), theo = theoreticalVol(p), vol = num(p.concreteVol);
  if (p.deliveredGrade && p.grade && norm(p.deliveredGrade) !== norm(String(p.grade)))
    out.push({ level: "warn", text: `Grade: ${p.deliveredGrade} vs spec ${p.grade} MPa` });
  if (stage === "poured" || stage === "qa") {
    if (vol == null) out.push({ level: "warn", text: "Pour logged, volume missing" });
    else if (theo) {
      const dev = (vol - theo) / theo;
      if (dev < -0.1) out.push({ level: "warn", text: `Under-pour: ${vol} vs ${theo.toFixed(2)} theo` });
      else if (dev > 0.2) out.push({ level: "info", text: `Overbreak +${Math.round(dev * 100)}%` });
    }
    if (!hp.cage.released) out.push({ level: "warn", text: "Poured before pre-pour HP released" });
    if (!hp.pour.hasPhoto) out.push({ level: "warn", text: "Pour HP photo missing" });
  }
  if ((stage === "cage" || stage === "poured" || stage === "qa") && !hp.cage.hasPhoto)
    out.push({ level: "warn", text: "Cage HP photo missing" });
  if (stage !== "not_started" && !hp.drill.hasPhoto)
    out.push({ level: "warn", text: "Drill HP photo missing" });
  return out;
}
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const fmtN = (v, d = 1) => (num(v) == null ? "—" : num(v).toFixed(d));
const fmtInt = (v) => (num(v) == null ? "—" : String(num(v)));
const norm = (s) => (s || "").toString().trim().toLowerCase();

/* ───────────────────────── pile glyph ───────────────────────── */
function PileGlyph({ stage, size = 38 }) {
  const w = size * 0.46, h = size, m = stageMeta(stage);
  const fillLevels = { not_started: 0, drilled: 0, cage: 0.55, poured: 1, qa: 1 };
  const fill = fillLevels[stage] ?? 0, top = h * (1 - fill), bored = stage !== "not_started", id = `pile-${stage}-${size}`;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: "block", flexShrink: 0 }}>
      <defs><clipPath id={id}><path d={`M2 2 H${w - 2} V${h - w / 2} A${(w - 4) / 2} ${(w - 4) / 2} 0 0 1 2 ${h - w / 2} Z`} /></clipPath></defs>
      <path d={`M2 2 H${w - 2} V${h - w / 2} A${(w - 4) / 2} ${(w - 4) / 2} 0 0 1 2 ${h - w / 2} Z`} fill={bored ? "#EEF1F4" : "none"} stroke={bored ? "#9AA4B0" : "#C2C9D2"} strokeWidth="1.6" strokeDasharray={bored ? "none" : "3 3"} />
      {fill > 0 && <rect x="0" y={top} width={w} height={h - top} fill={m.color} clipPath={`url(#${id})`} opacity={stage === "cage" ? 0.18 : 0.9} />}
      {(stage === "cage" || stage === "poured" || stage === "qa") && (
        <g clipPath={`url(#${id})`} stroke={stage === "cage" ? "#7A5BD0" : "rgba(255,255,255,0.55)"} strokeWidth="1.1">
          <line x1="0" y1={h * 0.32} x2={w} y2={h * 0.32} /><line x1="0" y1={h * 0.52} x2={w} y2={h * 0.52} /><line x1="0" y1={h * 0.72} x2={w} y2={h * 0.72} /><line x1={w * 0.32} y1="2" x2={w * 0.32} y2={h} /><line x1={w * 0.68} y1="2" x2={w * 0.68} y2={h} />
        </g>
      )}
      {stage === "qa" && <circle cx={w - 1} cy={6} r={6} fill="#2E9E5B" stroke="#fff" strokeWidth="1.4" />}
    </svg>
  );
}

function Stat({ label, value, sub, accent }) {

function StageBar({ counts, total }) {
  if (!total) return null;
  return (<div className="pt-stagebar"><div className="pt-stagebar-track">{STAGES.map((s) => { const c = counts[s.key] || 0; return c ? <div key={s.key} title={`${s.label}: ${c}`} style={{ flex: c, background: s.color }} /> : null; })}</div><div className="pt-stagebar-legend">{STAGES.map((s) => <span key={s.key} className="pt-legend-item"><span className="pt-dot" style={{ background: s.color }} />{s.short} <b>{counts[s.key] || 0}</b></span>)}</div></div>);
}
function hpPip(p, which) {
  const hp = getHp(p);
  if (which === "drill") {
    if (hp.drill.released) return { c: "#2E9E5B", t: "Drill HP released" };
    if (p.drillDate) return { c: "#E0871E", t: "Drilled, HP open" };
    return { c: "#C2C9D2", t: "Drill pending" };
  }
  if (which === "cage") {
    if (hp.cage.released) return { c: "#2E9E5B", t: "Cage HP released" };
    if (p.cageStatus === "Installed") return { c: "#E0871E", t: "Cage in ground, HP open" };
    return { c: "#C2C9D2", t: "Cage pending" };
  }
  if (hp.pour.released) return { c: "#2E9E5B", t: "Pour HP released" };

/* ───────────────────────── reconciliation ───────────────────────── */
const REG_STATUS = {
  matched: { label: "Matched", color: "#2E9E5B" },
  mismatch: { label: "Mismatch", color: "#C5432B" },
  missing: { label: "Not logged", color: "#94A0AE" },
  unregistered: { label: "Not in register", color: "#E0871E" },
  cancelled: { label: "Cancelled", color: "#B9C0C9" },
};
function reconcile(register, piles, projectId) {
  const reg = register.filter((r) => projectId === "all" || r.projectId === projectId);
  const trk = piles.filter((p) => projectId === "all" || p.projectId === projectId);
  const byKey = {}; trk.forEach((p) => { byKey[p.projectId + "|" + norm(p.pileRef)] = p; });
  const seen = new Set();
  const rows = reg.map((r) => {
    const key = r.projectId + "|" + norm(r.pileRef); seen.add(key);
    const t = byKey[key]; let status = "missing", detail = [];
    if (r.cancelled && !t) return { reg: r, trk: null, status: "cancelled", detail: "" };
    if (t) {
      if (r.cancelled) detail.push("cancelled in register");
      const checks = [["Ø", r.dia, t.dia], ["grade", r.grade, t.grade], ["reo", r.verticalReo, t.verticalReo], ["reo-btm", r.verticalReoLower, t.verticalReoLower], ["ligs", r.ligs, t.ligs]];
      checks.forEach(([lbl, a, b]) => { if (a != null && a !== "" && b != null && b !== "" && norm(a) !== norm(b)) detail.push(`${lbl} ${a}→${b}`); });
      status = detail.length ? "mismatch" : "matched";
    }
    return { reg: r, trk: t, status, detail: detail.join(", ") };
  });
  const extra = trk.filter((p) => !seen.has(p.projectId + "|" + norm(p.pileRef))).map((p) => ({ trk: p, status: "unregistered", detail: "" }));
  return [...rows, ...extra];
}
const RENDER_CAP = 250;

function RegisterView({ register, piles, projects, active, onAdd, onImport, onLoadSchedule, onLoadCPB, onEditEntry, onLog, onEditPile }) {
  const [filter, setFilter] = useState("all");
  const [q, setQ] = useState("");
  const rows = useMemo(() => reconcile(register, piles, active), [register, piles, active]);
  const counts = useMemo(() => rows.reduce((a, r) => { a[r.status] = (a[r.status] || 0) + 1; a.total++; return a; }, { total: 0 }), [rows]);
  const filtered = useMemo(() => {
    const s = q.trim().toLowerCase();
    return rows.filter((r) => filter === "all" || r.status === filter).filter((r) => { if (!s) return true; const src = r.reg || r.trk; return String(src.pileRef).toLowerCase().includes(s) || norm(src.verticalReo).includes(s); });
  }, [rows, filter, q]);
  const shown = filtered.slice(0, RENDER_CAP);
  const issues = (counts.mismatch || 0) + (counts.missing || 0) + (counts.unregistered || 0);

  if (register.filter((r) => active === "all" || r.projectId === active).length === 0 && rows.length === 0) {
    return (
      <div className="pt-empty pt-empty-lg">
        <div className="pt-empty-glyph"><ClipboardList size={56} strokeWidth={1.4} color="#26384F" /></div>
        <h2>Build your pile register</h2>
        <p>Your source of truth from the schedule. Load it once, then the board flags any pile the site team logs that doesn't match — or hasn't been logged at all.</p>
        <div className="pt-empty-actions">
          <button className="pt-btn pt-btn-primary" onClick={onLoadSchedule}><Upload size={16} /> Load Rev 26 (1300)</button>
          <button className="pt-btn pt-btn-primary" onClick={onLoadCPB}><Upload size={16} /> Load CPB job (123)</button>
          <button className="pt-btn pt-btn-ghost" onClick={onImport} disabled={active === "all"}>Paste a register</button>
          <button className="pt-btn pt-btn-ghost" onClick={onAdd} disabled={active === "all"}><Plus size={15} /> Add entry</button>
        </div>
        {active === "all" && <div className="pt-hint" style={{ marginTop: 14 }}>Pick a specific job above to add register entries manually.</div>}
      </div>
    );
  }
  return (
    <>
      <div className="pt-recon-summary">
        {(() => {
          const hasRev = projects.some((p) => p.code === "REV26");
          const hasCPB = projects.some((p) => p.code === "CPB");
          if (hasRev && hasCPB) return null;
          return (
            <div className="pt-loadrow">
              <span className="pt-loadrow-label">Add a job:</span>
              {!hasRev && <button className="pt-btn pt-btn-ghost pt-btn-sm" onClick={onLoadSchedule}><Upload size={14} /> Rev 26 (1300)</button>}
              {!hasCPB && <button className="pt-btn pt-btn-ghost pt-btn-sm" onClick={onLoadCPB}><Upload size={14} /> CPB job (123)</button>}
            </div>
          );
        })()}
        <div className="pt-recon-headline"><ClipboardCheck size={18} color={issues ? "#C5432B" : "#2E9E5B"} /><span>{issues === 0 ? "Site log matches the register" : `${issues} item${issues === 1 ? "" : "s"} to reconcile`}</span></div>
        <div className="pt-recon-stats">
          <button className={"pt-recon-stat" + (filter === "all" ? " is-active" : "")} onClick={() => setFilter("all")}><b>{counts.total}</b> registered</button>
          <button className={"pt-recon-stat" + (filter === "matched" ? " is-active" : "")} onClick={() => setFilter("matched")}><span className="pt-dot" style={{ background: REG_STATUS.matched.color }} /><b>{counts.matched || 0}</b> matched</button>
          <button className={"pt-recon-stat" + (filter === "mismatch" ? " is-active" : "")} onClick={() => setFilter("mismatch")}><span className="pt-dot" style={{ background: REG_STATUS.mismatch.color }} /><b>{counts.mismatch || 0}</b> mismatch</button>
          <button className={"pt-recon-stat" + (filter === "missing" ? " is-active" : "")} onClick={() => setFilter("missing")}><span className="pt-dot" style={{ background: REG_STATUS.missing.color }} /><b>{counts.missing || 0}</b> not logged</button>
          <button className={"pt-recon-stat" + (filter === "unregistered" ? " is-active" : "")} onClick={() => setFilter("unregistered")}><span className="pt-dot" style={{ background: REG_STATUS.unregistered.color }} /><b>{counts.unregistered || 0}</b> not in reg.</button>
          {counts.cancelled ? <button className={"pt-recon-stat" + (filter === "cancelled" ? " is-active" : "")} onClick={() => setFilter("cancelled")}><span className="pt-dot" style={{ background: REG_STATUS.cancelled.color }} /><b>{counts.cancelled}</b> cancelled</button> : null}
        </div>
        <div className="pt-searchbox" style={{ marginTop: 12 }}><Search size={15} /><input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Find pile number or reo…" /></div>
      </div>
      <div className="pt-recon-list">
        <div className="pt-recon-row pt-recon-head"><div>Pile</div><div>Ø/grade</div><div>Reo/ligs (reg.)</div><div>Logged status</div><div>Check</div><div></div></div>
        {shown.map((r, i) => {
          const st = REG_STATUS[r.status], src = r.reg || r.trk, stage = r.trk ? computeStage(r.trk) : null;
          return (
            <div className="pt-recon-row" key={i}>
              <div className="pt-recon-ref">{src.pileRef}</div>
              <div className="pt-mono">{r.reg ? `${fmtInt(r.reg.dia)}·${fmtInt(r.reg.grade)}` : <span className="pt-muted">—</span>}</div>
              <div className="pt-mono pt-small">{r.reg ? `${r.reg.verticalReo || "—"}${r.reg.verticalReoLower ? " · " + r.reg.verticalReoLower : ""} / ${r.reg.ligs || "—"}` : <span className="pt-muted">—</span>}</div>
              <div>{stage ? <span className="pt-chip" style={{ background: stageMeta(stage).color + "22", color: stageMeta(stage).color }}>{stageMeta(stage).label}</span> : <span className="pt-muted">—</span>}</div>
              <div><span className="pt-recon-badge" style={{ background: st.color + "1e", color: st.color }}>{st.label}</span>{r.detail && <span className="pt-recon-detail">{r.detail}</span>}</div>
              <div className="pt-recon-act">
                {r.status === "missing" && <button className="pt-btn pt-btn-ghost pt-btn-sm" onClick={() => onLog(r.reg)}><Plus size={13} /> Log</button>}
                {r.trk && <button className="pt-iconbtn" onClick={() => onEditPile(r.trk)}><Pencil size={14} /></button>}
                {r.reg && <button className="pt-iconbtn" onClick={() => onEditEntry(r.reg)} title="Edit register entry"><ClipboardList size={14} /></button>}
              </div>
            </div>
          );
        })}
        {filtered.length > RENDER_CAP && <div className="pt-recon-more">Showing {RENDER_CAP} of {filtered.length} — search or filter to narrow.</div>}
        {shown.length === 0 && <div className="pt-empty" style={{ border: "none" }}>Nothing in this filter.</div>}
      </div>
    </>
  );
}

/* ───────────────────────── ITP report ───────────────────────── */
function ItpReport({ pile, project, photos }) {
  const stage = computeStage(pile), hp = getHp(pile), theo = theoreticalVol(pile), fl = flagsFor(pile);
  const vol = num(pile.concreteVol);
  const variance = (theo && vol != null) ? Math.round((vol - theo) / theo * 100) : null;
  const cell = (label, val) => (<div className="itp-cell"><div className="itp-cell-k">{label}</div><div className="itp-cell-v">{(val === 0 || val) ? val : "—"}</div></div>);
  const hpRow = (label, h, photo) => (
    <tr>
      <td>{label}</td>
      <td><span className={"itp-pillbox " + (h.released ? "ok" : "open")}>{h.released ? "Released" : "Open"}</span></td>
      <td>{h.inspector || "—"}</td>
      <td>{h.date || "—"}</td>
      <td className="itp-ph">{photo ? <img src={photo} alt="" /> : <span className="itp-na">no photo</span>}</td>
    </tr>
  );
  return (
    <div className="pt-print-page">
      <div className="itp-head">
        <img className="itp-logo" src={LOGO_URI} alt="NCF" />
        <div className="itp-title"><div className="itp-t1">Inspection &amp; Test Plan</div><div className="itp-t2">Bored Pile Record</div></div>
      </div>
      <div className="itp-meta">
        {cell("Project", project ? `${project.code ? project.code + " — " : ""}${project.name}` : "—")}
        {cell("Pile No.", pile.pileRef)}
        {cell("Contract no.", project && project.contractNo)}
        {cell("Report date", new Date().toLocaleDateString())}
      </div>
      <div className="itp-sec">Design / schedule</div>
      <div className="itp-grid">
        {cell("Pile Ø (mm)", pile.dia)}
        {cell("Concrete grade (MPa)", pile.grade)}
        {cell("Socket (m)", pile.socket)}
        {cell("Ligatures", pile.ligs)}
        {cell("Vertical reo (top)", pile.verticalReo)}
        {cell("Vertical reo — lower 2 m", pile.verticalReoLower)}
        {cell("Cut-off level RL", pile.cutoffRL)}
        {cell("Top of steel RL", pile.topSteelRL)}
        {cell("Grid reference", pile.gridRef)}
      </div>
      <div className="itp-sec">As-built / drilling</div>
      <div className="itp-grid">
        {cell("Drill date", pile.drillDate)}
        {cell("Driller / rig", pile.driller)}
        {cell("Drilled depth (m)", pile.actualDepth)}
        {cell("Actual Ø (mm)", pile.actualDia)}
      </div>
      <div className="itp-sec">Hold points &amp; witness</div>
      <table className="itp-hp">
        <thead><tr><th>Hold point</th><th>Status</th><th>Inspector</th><th>Date</th><th>Photo</th></tr></thead>
        <tbody>
          {hpRow("Pile drilled", hp.drill, photos && photos.drill)}
          {hpRow("Cage in ground (pre-pour)", hp.cage, photos && photos.cage)}
          {hpRow("Pile poured", hp.pour, photos && photos.pour)}
        </tbody>
      </table>
      <div className="itp-sec">Pour</div>
      <div className="itp-grid">
        {cell("Pour date", pile.pourDate)}
        {cell("Concrete volume (m³)", vol != null ? vol : "—")}
        {cell("Theoretical vol (m³)", theo != null ? theo.toFixed(2) : "—")}
        {cell("Variance vs theo", variance != null ? (variance >= 0 ? "+" : "") + variance + "%" : "—")}
        {cell("Delivered grade", pile.deliveredGrade)}
        {cell("Concrete docket no.", pile.concreteDocket)}
      </div>
      <div className="itp-sec">QA sign-off</div>
      <div className="itp-grid">
        {cell("QA status", pile.qaStatus)}
        {cell("QA inspector", pile.qaInspector)}
      </div>
      {pile.qaNotes ? <div className="itp-notes"><b>Notes: </b>{pile.qaNotes}</div> : null}
      {fl.length ? (<><div className="itp-sec">Observations / non-conformances</div><ul className="itp-flags">{fl.map((x, i) => <li key={i}>{x.text}</li>)}</ul></>) : null}
      <div className="itp-sign">
        <div className="itp-sign-box"><div className="itp-sign-line"></div>Inspected by / date</div>
        <div className="itp-sign-box"><div className="itp-sign-line"></div>Approved by / date</div>
      </div>
      <div className="itp-foot">NCF — Build with Confidence · ncf.group · Pile {pile.pileRef}{project ? ` · ${project.code || project.name}` : ""}</div>
    </div>
  );
}

        <div className="itp-sign-box"><div className="itp-sign-line"></div>Approved by / date</div>

/* ───────────────────────── app ───────────────────────── */
function PileTracker() {
  const [loading, setLoading] = useState(true);
  const [projects, setProjects] = useState([]);
  const [piles, setPiles] = useState([]);
  const [register, setRegister] = useState([]);
  const [view, setView] = useState("tracker");
  const [active, setActive] = useState("all");
  const [stageFilter, setStageFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [editing, setEditing] = useState(null);
  const [showProject, setShowProject] = useState(false);
  const [editingReg, setEditingReg] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [banner, setBanner] = useState(null);
  const [printData, setPrintData] = useState(null);

  useEffect(() => { (async () => { setProjects((await getKey(PROJECTS_KEY)) || []); setPiles((await getKey(PILES_KEY)) || []); setRegister((await getKey(REGISTER_KEY)) || []); setLoading(false); })(); }, []);

  useEffect(() => {
    if (!printData) return;
    const done = () => { window.removeEventListener("afterprint", done); setPrintData(null); };
    window.addEventListener("afterprint", done);
    const t = setTimeout(() => { try { window.print(); } catch (e) {} }, 150);
    return () => { clearTimeout(t); window.removeEventListener("afterprint", done); };
  }, [printData]);

  const openItp = async (list) => {
    if (!list || !list.length) return;
    const photoMap = {};
    for (const p of list) {
      photoMap[p.id || "tmp"] = { drill: await getKey(photoKey(p.id, "drill")), cage: await getKey(photoKey(p.id, "cage")), pour: await getKey(photoKey(p.id, "pour")) };
    }
    setPrintData({ mode: "full", piles: list, photos: photoMap });
  };
  const printOne = (pile, ph) => { setPrintData({ mode: "full", piles: [pile], photos: { [pile.id || "tmp"]: ph } }); };
  const openChecklist = (list) => { if (!list || !list.length) return; const proj = active !== "all" ? projects.find((p) => p.id === active) : null; setPrintData({ mode: "checklist", piles: list, project: proj }); };

  const persistPiles = useCallback(async (next) => { setPiles(next); const ok = await setKey(PILES_KEY, next); if (!ok) setBanner("Couldn't save to shared storage — changes may not sync to teammates."); }, []);
  const persistProjects = useCallback(async (next) => { setProjects(next); await setKey(PROJECTS_KEY, next); }, []);
  const persistRegister = useCallback(async (next) => { setRegister(next); await setKey(REGISTER_KEY, next); }, []);

  const savePile = async (f, photos) => {
    const exists = piles.some((x) => x.id === f.id); const id = f.id || uid();
    const hp = { drill: { ...f.hp.drill }, cage: { ...f.hp.cage }, pour: { ...f.hp.pour } };
    for (const k of ["drill", "cage", "pour"]) { const data = photos[k]; if (data) { await setKey(photoKey(id, k), data); hp[k].hasPhoto = true; } else { await delKey(photoKey(id, k)); hp[k].hasPhoto = false; } }
    const rec = { ...f, id, hp };
    persistPiles(exists ? piles.map((x) => (x.id === id ? rec : x)) : [...piles, rec]); setEditing(null);
  };
  const deletePile = async (id) => { await delKey(photoKey(id, "drill")); await delKey(photoKey(id, "cage")); await delKey(photoKey(id, "pour")); persistPiles(piles.filter((x) => x.id !== id)); setEditing(null); };
  const saveProject = (f) => { if (f.id) { persistProjects(projects.map((p) => (p.id === f.id ? { ...p, ...f } : p))); } else { const proj = { ...f, id: uid() }; persistProjects([...projects, proj]); setActive(proj.id); } setShowProject(false); };
  const saveReg = (f) => { const exists = register.some((x) => x.id === f.id); const rec = { ...f, id: f.id || uid() }; persistRegister(exists ? register.map((x) => (x.id === rec.id ? rec : x)) : [...register, rec]); setEditingReg(null); };
  const deleteReg = (id) => { persistRegister(register.filter((x) => x.id !== id)); setEditingReg(null); };
  const doImport = (projectId, rows) => { persistRegister([...register, ...rows.map((r) => ({ ...r, id: uid(), projectId }))]); setShowImport(false); };
  const logFromRegister = (reg) => setEditing({ projectId: reg.projectId, pileRef: reg.pileRef, dia: reg.dia, grade: reg.grade, verticalReo: reg.verticalReo, verticalReoLower: reg.verticalReoLower, ligs: reg.ligs, socket: reg.socket, cutoffRL: reg.cutoffRL, topSteelRL: reg.topSteelRL, gridRef: reg.gridRef });
  const loadSchedule = () => { const { proj, register: rg } = seedSchedule(); persistProjects([...projects, proj]); persistRegister([...register, ...rg]); setActive(proj.id); setView("register"); };
  const loadCPB = () => { const { proj, register: rg } = seedCPB(); persistProjects([...projects, proj]); persistRegister([...register, ...rg]); setActive(proj.id); setView("register"); };

  const scoped = useMemo(() => piles.filter((p) => active === "all" || p.projectId === active), [piles, active]);
  const visible = useMemo(() => {
    const qq = search.trim().toLowerCase();
    return scoped.filter((p) => stageFilter === "all" || computeStage(p) === stageFilter)
      .filter((p) => !qq || (String(p.pileRef) + " " + (p.verticalReo || "")).toLowerCase().includes(qq))
      .sort((a, b) => String(a.pileRef).localeCompare(String(b.pileRef), undefined, { numeric: true }));
  }, [scoped, stageFilter, search]);
  const stats = useMemo(() => {
    const counts = {}; let poured = 0, theoSum = 0, done = 0;
    scoped.forEach((p) => { const s = computeStage(p); counts[s] = (counts[s] || 0) + 1; if (s === "qa") done++; const v = num(p.concreteVol); if (v != null && (s === "poured" || s === "qa")) poured += v; const t = theoreticalVol(p); if (t != null && (s === "poured" || s === "qa")) theoSum += t; });
    const total = scoped.length;
    return { counts, total, poured, theoSum, pct: total ? Math.round((done / total) * 100) : 0, variance: theoSum ? Math.round(((poured - theoSum) / theoSum) * 100) : null };
  }, [scoped]);

  const exportCsv = () => {
    const cols = ["Pile Number", "Pile Dia(mm)", "Concrete Grade(Mpa)", "Vertical Reo", "Vertical Reo-Lower 2 M", "Ligs", "Socket", "Pile Cut off level RL", "Top of steel R.L", "Grid ref", "Stage", "Drill date", "Drilled depth(m)", "Driller/rig", "Actual Ø(mm)", "Drill HP", "Drill photo", "Cage", "Cage HP", "Cage photo", "Pour date", "Concrete vol(m³)", "Concrete docket", "Delivered grade", "Theo vol(m³)", "Pour HP", "Pour photo", "QA", "Inspector", "Notes", "Flags"];
    const esc = (v) => { const s = v == null ? "" : String(v); return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s; };
    const rows = visible.map((p) => { const theo = theoreticalVol(p), hp = getHp(p); return [p.pileRef, p.dia, p.grade, p.verticalReo, p.verticalReoLower, p.ligs, p.socket, p.cutoffRL, p.topSteelRL, p.gridRef, stageMeta(computeStage(p)).label, p.drillDate, p.actualDepth, p.driller, p.actualDia, hp.drill.released ? "Released" : "Open", hp.drill.hasPhoto ? "Yes" : "No", p.cageStatus, hp.cage.released ? "Released" : "Open", hp.cage.hasPhoto ? "Yes" : "No", p.pourDate, p.concreteVol, p.concreteDocket, p.deliveredGrade, theo != null ? theo.toFixed(2) : "", hp.pour.released ? "Released" : "Open", hp.pour.hasPhoto ? "Yes" : "No", p.qaStatus, p.qaInspector, p.qaNotes, flagsFor(p).map((x) => x.text).join("; ")].map(esc).join(","); });
    const csv = [cols.join(","), ...rows].join("\n");
    const blob = new Blob([csv], { type: "text/csv" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `pile-tracker-${new Date().toISOString().slice(0, 10)}.csv`; a.click(); URL.revokeObjectURL(a.href);
  };

  const regCount = register.filter((r) => active === "all" || r.projectId === active).length;
  const visShown = visible.slice(0, RENDER_CAP);

  return (
    <div className="pt-app">
      <style>{CSS}</style>
      <div className="pt-brandbar"><img src={LOGO_URI} alt="NCF — Build with Confidence" /></div>
      <header className="pt-header">
        <div className="pt-brand"><span className="pt-brand-mark"><HardHat size={18} /></span><div><div className="pt-brand-name">Pile Tracker</div><div className="pt-brand-sub">Drill · cage · pour · QA</div></div></div>
        <div className="pt-header-actions">
          {view === "tracker" ? (<><button className="pt-btn pt-btn-ghost" onClick={() => openItp(visible)} disabled={!visible.length}><Printer size={15} /> ITP sheets</button><button className="pt-btn pt-btn-ghost" onClick={() => openChecklist(visible)} disabled={!visible.length}><ListChecks size={15} /> ITP list</button><button className="pt-btn pt-btn-ghost" onClick={exportCsv} disabled={!visible.length}><Download size={15} /> Export CSV</button><button className="pt-btn pt-btn-primary" onClick={() => setEditing({})} disabled={!projects.length}><Plus size={16} /> Add pile</button></>)
            : (<><button className="pt-btn pt-btn-ghost" onClick={() => setShowImport(true)} disabled={!projects.length}><Upload size={15} /> Import</button><button className="pt-btn pt-btn-primary" onClick={() => setEditingReg({})} disabled={!projects.length}><Plus size={16} /> Add entry</button></>)}
        </div>
      </header>
      {banner && <div className="pt-banner"><AlertTriangle size={15} /> {banner} <button onClick={() => setBanner(null)}><X size={14} /></button></div>}
      {!loading && projects.length > 0 && (
        <div className="pt-tabs">
          <button className={"pt-tab" + (view === "tracker" ? " is-active" : "")} onClick={() => setView("tracker")}><ListChecks size={15} /> Tracker</button>
          <button className={"pt-tab" + (view === "register" ? " is-active" : "")} onClick={() => setView("register")}><ClipboardList size={15} /> Register <span className="pt-tab-count">{regCount}</span></button>
        </div>
      )}
      {loading ? (<div className="pt-empty"><div className="pt-spinner" /> Loading the yard…</div>)
        : projects.length === 0 ? (
          <div className="pt-empty pt-empty-lg">
            <div className="pt-empty-glyph"><PileGlyph stage="poured" size={64} /></div>
            <h2>Start tracking your piles</h2>
            <p>Load your Rev 26 schedule to populate the register with all 1,300 piles, then log each one as it's drilled, caged, poured and signed off — with hold-point photos.</p>
            <div className="pt-empty-actions"><button className="pt-btn pt-btn-primary" onClick={loadSchedule}><Upload size={16} /> Load Rev 26 (1300)</button><button className="pt-btn pt-btn-primary" onClick={loadCPB}><Upload size={16} /> Load CPB job (123)</button><button className="pt-btn pt-btn-ghost" onClick={() => setShowProject(true)}><FolderPlus size={16} /> Add a blank job</button></div>
          </div>
        ) : (
          <>
            <div className="pt-projects">
              <button className={"pt-proj" + (active === "all" ? " is-active" : "")} onClick={() => setActive("all")}><Building2 size={14} /> All jobs <span className="pt-proj-count">{view === "register" ? register.length : piles.length}</span></button>
              {projects.map((p) => { const c = (view === "register" ? register : piles).filter((x) => x.projectId === p.id).length; return <button key={p.id} className={"pt-proj" + (active === p.id ? " is-active" : "")} onClick={() => setActive(p.id)}>{p.code || p.name}<span className="pt-proj-count">{c}</span></button>; })}
              <button className="pt-proj pt-proj-add" onClick={() => setShowProject(true)}><Plus size={14} /> Job</button>
            {active !== "all" && <button className="pt-proj pt-proj-add" onClick={() => setShowProject(projects.find((p) => p.id === active))}><Pencil size={13} /> Edit</button>}
            </div>
            {view === "tracker" ? (
              <>
                <div className="pt-stats">
                  <Stat label="Piles logged" value={stats.total} sub={regCount ? `of ${regCount} in reg.` : undefined} />
                  <Stat label="Poured" value={(stats.counts.poured || 0) + (stats.counts.qa || 0)} sub={`of ${stats.total}`} />
                  <Stat label="QA complete" value={stats.pct + "%"} accent="#2E9E5B" />
                  <Stat label="Concrete poured" value={stats.poured.toFixed(1)} sub="m³ logged" accent="#E0871E" />
                  <Stat label="Vol vs theo" value={stats.variance == null ? "—" : (stats.variance >= 0 ? "+" : "") + stats.variance + "%"} sub={stats.theoSum ? `${stats.theoSum.toFixed(1)} m³ theo` : "no pours yet"} accent={stats.variance != null && stats.variance < -5 ? "#C5432B" : undefined} />
                </div>
                <StageBar counts={stats.counts} total={stats.total} />
                <div className="pt-controls">
                  <div className="pt-searchbox"><Search size={15} /><input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search pile number or reo…" /></div>
                  <div className="pt-filters"><button className={"pt-pill" + (stageFilter === "all" ? " is-active" : "")} onClick={() => setStageFilter("all")}>All</button>{STAGES.map((s) => <button key={s.key} className={"pt-pill" + (stageFilter === s.key ? " is-active" : "")} onClick={() => setStageFilter(s.key)} style={stageFilter === s.key ? { borderColor: s.color, color: s.color } : undefined}><span className="pt-dot" style={{ background: s.color }} />{s.short}</button>)}</div>
                </div>
                <div className="pt-list">
                  {visible.length === 0 ? (
                    <div className="pt-empty"><MoreHorizontal size={20} />{scoped.length === 0 ? "No piles logged yet — log them from the Register tab, or add one here." : "No piles match these filters."}{scoped.length === 0 && <div className="pt-empty-actions" style={{ marginTop: 12 }}><button className="pt-btn pt-btn-ghost" onClick={() => setView("register")}><ClipboardList size={15} /> Go to Register</button><button className="pt-btn pt-btn-primary" onClick={() => setEditing({ projectId: active === "all" ? projects[0].id : active })}><Plus size={15} /> Add pile</button></div>}</div>
                  ) : (<>{visShown.map((p) => <PileRow key={p.id} p={p} projects={projects} onEdit={(x) => setEditing(x)} />)}{visible.length > RENDER_CAP && <div className="pt-recon-more">Showing {RENDER_CAP} of {visible.length} — search or filter to narrow.</div>}</>)}
                </div>
              </>
            ) : (
              <RegisterView register={register} piles={piles} projects={projects} active={active} onAdd={() => setEditingReg({ projectId: active !== "all" ? active : projects[0]?.id })} onImport={() => setShowImport(true)} onLoadSchedule={loadSchedule} onLoadCPB={loadCPB} onEditEntry={(r) => setEditingReg(r)} onLog={logFromRegister} onEditPile={(p) => setEditing(p)} />
            )}
          </>
        )}
      {editing && <PileModal pile={editing.id ? editing : (editing.projectId ? editing : null)} projects={projects} defaultProject={active !== "all" ? active : undefined} onSave={savePile} onDelete={deletePile} onPrint={printOne} onClose={() => setEditing(null)} />}
      {showProject && <ProjectModal project={typeof showProject === "object" ? showProject : null} onSave={saveProject} onLoadSchedule={() => { loadSchedule(); setShowProject(false); }} onLoadCPB={() => { loadCPB(); setShowProject(false); }} onClose={() => setShowProject(false)} />}
      {editingReg && <RegisterEntryModal entry={editingReg.id ? editingReg : null} projects={projects} defaultProject={editingReg.projectId || (active !== "all" ? active : undefined)} onSave={saveReg} onDelete={deleteReg} onClose={() => setEditingReg(null)} />}
      {showImport && <ImportModal projects={projects} defaultProject={active !== "all" ? active : undefined} onImport={doImport} onClose={() => setShowImport(false)} />}
      {printData && (<div className="pt-print">{printData.mode === "checklist" ? <ChecklistReport piles={printData.piles} project={printData.project} projects={projects} /> : printData.piles.map((p) => <ItpReport key={p.id || "tmp"} pile={p} project={projects.find((x) => x.id === p.projectId)} photos={printData.photos[p.id || "tmp"]} />)}</div>)}
    </div>
  );
}

.itp-sec{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#26384F;background:#eef1f4;padding:5px 9px;border-radius:4px;margin:14px 0 8px;}
.itp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.itp-cell{border:1px solid #D8DDE4;border-radius:5px;padding:6px 9px;}
.itp-cell-k{font-size:8.5px;text-transform:uppercase;letter-spacing:.05em;color:#697482;font-weight:700;}
.itp-cell-v{font-size:12.5px;font-weight:600;color:#161B22;margin-top:2px;word-break:break-word;}
.itp-hp{width:100%;border-collapse:collapse;}
.itp-hp th,.itp-hp td{border:1px solid #D8DDE4;padding:6px 8px;font-size:11px;text-align:left;vertical-align:middle;}
.itp-hp th{background:#26384F;color:#fff;font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;}
.itp-pillbox{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;}
.itp-pillbox.ok{background:#e3f3ea;color:#2E9E5B;}
.itp-pillbox.open{background:#f0f2f5;color:#697482;}
.itp-ph img{height:54px;width:auto;border-radius:3px;display:block;}
.itp-na{color:#b0b7c0;font-size:10px;font-style:italic;}
.itp-notes{font-size:11.5px;margin-top:8px;color:#161B22;}
.itp-flags{margin:4px 0 0;padding-left:18px;font-size:11.5px;color:#C5432B;}
.itp-sign{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:24px;}
.itp-sign-box{font-size:10px;color:#697482;text-transform:uppercase;letter-spacing:.05em;}
.itp-sign-line{border-bottom:1px solid #161B22;height:34px;margin-bottom:5px;}
.itp-foot{margin-top:14px;border-top:1px solid #D8DDE4;padding-top:7px;font-size:9px;color:#94A0AE;text-align:center;}
.ck-table{width:100%;border-collapse:collapse;font-size:9px;margin-top:2px;}
.ck-table th,.ck-table td{border:1px solid #D8DDE4;padding:4px 5px;text-align:left;vertical-align:middle;}
.ck-table th{background:#26384F;color:#fff;font-size:8px;text-transform:uppercase;letter-spacing:.03em;}
.ck-ref{font-weight:700;}
.ck-job{color:#697482;font-weight:600;}
.ck-ok{color:#2E9E5B;font-weight:800;}
.ck-no{color:#b0b7c0;}
.ck-sign{width:58px;}
.ck-table thead{display:table-header-group;}
@media print{
  .pt-app{background:#fff !important;padding:0 !important;}
  .pt-app > *:not(.pt-print){display:none !important;}
  .pt-print{display:block !important;}
  .pt-print-page{page-break-after:always;}
  .pt-print-page:last-child{page-break-after:auto;}
  @page{size:A4;margin:12mm;}
}
@media(max-width:900px){
  .pt-stats{grid-template-columns:repeat(2,1fr);}
  .pt-row{grid-template-columns:auto 1fr auto;grid-template-areas:"glyph id edit" "cells cells cells" "flags flags flags";row-gap:10px;}
  .pt-row-glyph{grid-area:glyph;}.pt-row-id{grid-area:id;}.pt-row-edit{grid-area:edit;}
  .pt-row .pt-cell:nth-of-type(2){grid-area:cells;display:flex;gap:16px;flex-wrap:wrap;}
  .pt-cell{display:inline-flex;flex-direction:column;}
  .pt-cell-flags{grid-area:flags;flex-direction:row;flex-wrap:wrap;}
  .pt-grid{grid-template-columns:repeat(2,1fr);}
  .pt-col2,.pt-col3{grid-column:span 2;}
  .pt-hp-body{grid-template-columns:1fr;}
  .pt-recon-row{grid-template-columns:1fr auto;grid-template-areas:"ref act" "meta meta" "status status";row-gap:8px;}
  .pt-recon-row>div:nth-child(1){grid-area:ref;}
  .pt-recon-row>div:nth-child(2),.pt-recon-row>div:nth-child(3),.pt-recon-row>div:nth-child(4){grid-area:meta;display:inline-flex;gap:10px;}
  .pt-recon-row>div:nth-child(5){grid-area:status;}
  .pt-recon-act{grid-area:act;}
  .pt-recon-head{display:none;}
}
@media(max-width:560px){.pt-app{padding:12px;}.pt-header-actions{width:100%;}.pt-header-actions .pt-btn{flex:1;justify-content:center;}}
`;

root.render(<PileTracker />);
